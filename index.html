<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX SCALPER PRO — BOLIVIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #F5C842; --gold-dim: #C9A227; --cyan: #00E5FF; --red: #FF4560; --green: #00E396; --orange: #FF9500;
            --bg: #080B10; --bg2: #0D1117; --bg3: #131A24; --bg4: #1A2333;
            --border: rgba(245,200,66,0.15); --text: #E8EDF5; --muted: #6B7A99;
            --font-head: 'Bebas Neue', sans-serif; --font-mono: 'Space Mono', monospace; --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; overflow-x: hidden; }

        .app-container { max-width: 1400px; margin: 0 auto; padding: 15px; display: grid; grid-template-columns: 350px 1fr 350px; gap: 15px; min-height: 100vh; }
        @media(max-width: 1100px) { .app-container { grid-template-columns: 1fr; padding-bottom: 80px; } }

        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        h2 { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 12px; color: var(--gold); display: flex; align-items: center; gap: 8px; }

        /* Veredicto Central */
        .verdict-box { text-align: center; padding: 30px; background: var(--bg3); border: 2px solid var(--gold); border-radius: 20px; box-shadow: 0 0 30px rgba(245,200,66,0.05); }
        .v-title { font-size: 4rem; font-family: var(--font-head); margin: 10px 0; line-height: 1; transition: 0.3s; }
        .v-details { font-family: var(--font-mono); font-size: 0.9rem; color: var(--muted); margin-bottom: 15px; min-height: 1.2em; }

        /* TradingView Widgets */
        .tv-container { height: 250px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 15px; }

        /* Checklist & Diario */
        .check-item { display: flex; align-items: center; gap: 12px; margin: 12px 0; cursor: pointer; padding: 10px; border-radius: 8px; background: var(--bg3); border: 1px solid transparent; }
        .check-item:hover { border-color: var(--gold-dim); }
        input[type="checkbox"] { accent-color: var(--gold); width: 20px; height: 20px; }
        textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 8px; resize: none; font-size: 0.95rem; font-family: inherit; }

        /* Calc */
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 10px; background: var(--bg4); border: 1px solid var(--border); color: white; border-radius: 6px; font-family: var(--font-mono); }

        .btn-gold { width: 100%; padding: 12px; background: var(--gold); color: var(--bg); border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-family: var(--font-head); font-size: 1.2rem; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.98); background: var(--gold-dim); }

        /* Bottom Nav (Mobile Only) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); display: none; grid-template-columns: repeat(3, 1fr); padding: 12px; border-top: 1px solid var(--gold); z-index: 100; }
        @media(max-width: 1100px) { .bottom-nav { display: grid; } }
        .nav-link { text-align: center; color: var(--muted); text-decoration: none; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="card">
            <h2><span id="session-icon">⏰</span> Sesión (BO)</h2>
            <div id="session-info" style="font-weight: 600; font-size: 1.1rem; color: var(--cyan);">Calculando...</div>
        </div>

        <div class="card">
            <h2>GOLD — 5 MIN</h2>
            <div class="tv-container">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=es&symbol=FX%3AXAUUSD&interval=5m&colorTheme=dark&width=100%&height=100%" style="width: 100%; height: 100%;"></iframe>
                </div>
            </div>
            <h2>NASDAQ — 5 MIN</h2>
            <div class="tv-container">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <iframe scrolling="no" allowtransparency="true" frameborder="0" src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=es&symbol=CURRENCYCOM%3AUS100&interval=5m&colorTheme=dark&width=100%&height=100%" style="width: 100%; height: 100%;"></iframe>
                </div>
            </div>
        </div>
    </aside>

    <main>
        <div class="verdict-box">
            <div style="text-transform: uppercase; letter-spacing: 3px; color: var(--muted); font-size: 0.8rem;">Algoritmo de Confluencia</div>
            <div class="v-title" id="main-verdict">ESPERAR</div>
            <div class="v-details" id="verdict-reason">Inicia el checklist para validar entrada...</div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Calculadora XTB</h2>
            <div class="calc-grid">
                <div class="input-group">
                    <label>Balance (USD)</label>
                    <input type="number" id="balance" value="1000">
                </div>
                <div class="input-group">
                    <label>Riesgo %</label>
                    <input type="number" id="risk" value="1">
                </div>
            </div>
            <div id="calc-display" style="background: var(--bg4); padding: 15px; border-radius: 8px; font-family: var(--font-mono); border-left: 4px solid var(--gold);">
                <div style="font-size: 0.8rem; color: var(--muted);">Max. Riesgo Admitido:</div>
                <div id="risk-val" style="font-size: 1.5rem; color: var(--red); font-weight: bold;">$10.00</div>
            </div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h2>Checklist Pre-Trade</h2>
            <div id="checklist">
                <label class="check-item"><input type="checkbox" data-id="trend"> Alineado con EMA 200 (Macro)</label>
                <label class="check-item"><input type="checkbox" data-id="ema50"> Precio cruza EMA 50 (Local)</label>
                <label class="check-item"><input type="checkbox" data-id="news"> Calendario Económico Limpio</label>
                <label class="check-item"><input type="checkbox" data-id="rsi"> RSI no está en extremos</label>
            </div>
        </div>

        <div class="card">
            <h2>Bitácora de Sesión</h2>
            <textarea id="notes" rows="6" placeholder="¿Qué viste en el precio hoy?"></textarea>
            <button class="btn-gold" style="margin-top: 10px;" onclick="saveSession()">GUARDAR SESIÓN</button>
        </div>
    </aside>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-link active">📈 Mercado</a>
    <a href="#" class="nav-link">⚖️ Riesgo</a>
    <a href="#" class="nav-link">📝 Bitácora</a>
</nav>

<script>
    // --- PERSISTENCIA & LOGICA ---
    function init() {
        // Cargar datos previos
        document.querySelectorAll('input[type="checkbox"]').forEach(box => {
            const state = localStorage.getItem(box.dataset.id);
            if(state === 'true') box.checked = true;
            box.addEventListener('change', () => {
                localStorage.setItem(box.dataset.id, box.checked);
                updateVerdict();
            });
        });

        const savedNotes = localStorage.getItem('apex_notes');
        if(savedNotes) document.getElementById('notes').value = savedNotes;

        // Calc Listeners
        document.getElementById('balance').addEventListener('input', runCalc);
        document.getElementById('risk').addEventListener('input', runCalc);

        setInterval(updateTime, 10000);
        updateTime();
        updateVerdict();
        runCalc();
    }

    function updateTime() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const boTime = new Date(utc + (3600000 * -4));
        const hour = boTime.getHours() + boTime.getMinutes()/60;

        let session = "⏰ Mercado Lento";
        let icon = "💤";
        let color = "var(--muted)";

        if(hour >= 8.5 && hour < 9.5) { session = "🟡 Pre-Apertura NY"; icon = "⏳"; color = "var(--orange)"; }
        else if(hour >= 9.5 && hour < 12) { session = "🟢 Ventana de Oro"; icon = "⚡"; color = "var(--green)"; }
        else if(hour >= 15 && hour < 17) { session = "🔵 Cierre de Sesión"; icon = "🏙️"; color = "var(--cyan)"; }

        document.getElementById('session-info').innerText = session;
        document.getElementById('session-info').style.color = color;
        document.getElementById('session-icon').innerText = icon;
    }

    function updateVerdict() {
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const total = document.querySelectorAll('input[type="checkbox"]').length;
        const vTitle = document.getElementById('main-verdict');
        const vReason = document.getElementById('verdict-reason');

        if(checked === total) {
            vTitle.innerText = "¡OPERAR!";
            vTitle.style.color = "var(--green)";
            vReason.innerText = "Confluencia total alcanzada. Revisa el lote.";
        } else if(checked >= 2) {
            vTitle.innerText = "VIGILAR";
            vTitle.style.color = "var(--orange)";
            vReason.innerText = "Esperando confirmación final del precio.";
        } else {
            vTitle.innerText = "ESPERAR";
            vTitle.style.color = "var(--muted)";
            vReason.innerText = "Criterios insuficientes para scalping seguro.";
        }
    }

    function runCalc() {
        const b = parseFloat(document.getElementById('balance').value) || 0;
        const r = parseFloat(document.getElementById('risk').value) || 0;
        const result = (b * (r/100)).toFixed(2);
        document.getElementById('risk-val').innerText = `$${result}`;
    }

    function saveSession() {
        localStorage.setItem('apex_notes', document.getElementById('notes').value);
        alert("✅ Sesión guardada en el navegador.");
    }

    window.onload = init;
</script>

</body>
</html>
